---
layout: default
title: Trainer Hub
---

<script>
  const pw = prompt("Trainer password?");
  if (pw !== "traineronly") window.location.href = "/";
</script>

<h1>Trainer Hub</h1>

<ul>
  {% assign sorted = site.trainers_hub | sort: "training_date" %}
  {% for t in sorted %}
    <li>
      <h2>{{ t.title }}</h2>
      {% for s in t.segments %}
        <p><strong>{{ s.speaker }}:</strong> {{ s.notes }}</p>
      {% endfor %}
    </li>
  {% endfor %}
</ul>
